# Mosquitto config for the AwoX smart-home setup (home LAN).
# Goes to /etc/mosquitto/conf.d/awox.conf. Listens on 1883 on all interfaces so the API bridge, Home
# Assistant and a Matter bridge can run on OR off the Pi. Anonymous access is fine on a trusted home
# LAN; add a password_file + ACLs (and/or restrict the listener to the LAN subnet) before exposing it
# more widely.
listener 1883
allow_anonymous true
# (persistence is already enabled by the base /etc/mosquitto/mosquitto.conf — don't re-declare it here,
#  mosquitto errors on a duplicate persistence_location.)
